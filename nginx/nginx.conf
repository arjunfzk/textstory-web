# Nginx reverse proxy for TextStory Web.
#
# Routes all traffic to the Next.js app and serves exported
# video files directly for better download performance.

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Limit upload size for profile photos
  client_max_body_size 5M;

  upstream nextjs {
    server web:3000;
  }

  server {
    listen 80;

    # Serve exported videos directly from Nginx (faster than proxying)
    location /exports/ {
      alias /tmp/textstory/exports/;
      add_header Content-Disposition 'attachment';
      expires 1h;
    }

    # Proxy everything else to Next.js
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Long timeout for export polling
      proxy_read_timeout 300s;
    }
  }
}
